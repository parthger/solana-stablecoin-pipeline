version: 2

sources:
  - name: bronze
    description: Raw ingested data from Helius API
    schema: bronze
    tables:
      - name: transactions
        description: Raw Solana transactions involving stablecoins
        columns:
          - name: signature
            description: Transaction signature (primary key)
            tests:
              - unique
              - not_null
          - name: slot
            description: Solana slot number
          - name: block_time
            description: Block timestamp
          - name: fee
            description: Transaction fee in lamports
          - name: fee_payer
            description: Account that paid the fee
          - name: success
            description: Whether transaction succeeded
      - name: transactions__token_transfers
        description: Token transfers extracted from transactions (dlt normalized)
        columns:
          - name: from_token_account
            description: Source token account
          - name: to_token_account
            description: Destination token account
          - name: from_user_account
            description: Source wallet owner
          - name: to_user_account
            description: Destination wallet owner
          - name: token_amount
            description: Amount transferred
          - name: mint
            description: Token mint address
          - name: _dlt_root_id
            description: Parent transaction ID

models:
  - name: stg_transactions
    description: Staged transactions filtered to successful only
    columns:
      - name: signature
        tests:
          - unique
          - not_null
